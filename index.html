<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Syntax Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="code-bg" id="codeBg"></div>
    
    <div class="quiz-container" id="quiz-window">
        <div class="terminal-header">
            <div class="circles">
                <span class="circle red"></span>
                <span class="circle yellow"></span>
                <span class="circle green"></span>
            </div>
            <div class="terminal-title">bash — javascript-quiz — 80x24</div>
        </div>

        <div class="stats-bar">
            <span id="progress">Step: 1/20</span>
            <span id="timer">Session Active</span>
        </div>

        <div class="content">
            <div class="question-container">
                <p class="prompt"><span>$</span> get-question --current</p>
                <h2 id="question-text">Initializing...</h2>
            </div>

            <div id="answer-options" class="options-grid">
                </div>
        </div>

        <div class="controls">
            <button id="prev-btn" class="nav-btn" disabled>_PREVIOUS</button>
            <button id="next-btn" class="nav-btn">_NEXT</button>
        </div>
    </div>

    <div id="result-screen" class="hide">
        <div class="quiz-container">
            <div class="terminal-header">
                <div class="circles"><span class="circle red"></span></div>
            </div>
            <div class="content results">
                <h1>Compilation Finished!</h1>
                <p id="score-report"></p>
                <button class="restart-btn" onclick="location.reload()">Reboot System</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

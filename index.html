<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevQuiz | Test Your Logic</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-animation"></div>
    
    <div class="quiz-container" id="quiz">
        <div class="quiz-header">
            <div class="stats">
                <span id="progress">Question 1/20</span>
                <span id="timer">Time: 15:00</span>
            </div>
            <div class="progress-bar"><div id="bar-fill"></div></div>
            <h2 id="question">Question text goes here...</h2>
        </div>

        <div class="quiz-body">
            <ul id="answer-list">
                </ul>
        </div>

        <div class="quiz-footer">
            <button id="prev-btn" disabled>Previous</button>
            <button id="next-btn">Next / Skip</button>
        </div>
    </div>

    <div id="result-container" class="hide">
        <h2>Quiz Complete!</h2>
        <p id="final-score"></p>
        <button onclick="location.reload()">Restart Quiz</button>
    </div>

    <script src="script.js"></script>
</body>
</html>

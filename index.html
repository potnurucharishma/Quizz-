<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CosmicQuiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Crimson+Pro:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ══ ANIMATED BACKGROUND ══ -->
  <div class="bg-wrap">
    <canvas id="aurora-canvas"></canvas>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
    <div class="geo-shapes">
      <div class="geo g1"></div>
      <div class="geo g2"></div>
      <div class="geo g3"></div>
      <div class="geo g4"></div>
      <div class="geo g5"></div>
      <div class="geo g6"></div>
    </div>
    <div class="grid-overlay"></div>
    <div class="noise-overlay"></div>
  </div>

  <!-- ══ CURSOR GLOW ══ -->
  <div class="cursor-glow" id="cursor-glow"></div>

  <!-- ══════════════════════════════════
       INTRO SCREEN
  ══════════════════════════════════ -->
  <div id="intro-screen" class="screen active">
    <div class="intro-wrap">
      <div class="intro-eyebrow">
        <span class="eyebrow-dot"></span>
        Knowledge Challenge
        <span class="eyebrow-dot"></span>
      </div>
      <h1 class="intro-headline">
        <span class="hl-line">Cosmic</span>
        <span class="hl-line accent-line">Quiz</span>
      </h1>
      <p class="intro-desc">
        20 curated questions across science, history,<br>
        geography &amp; culture. How far can you go?
      </p>
      <div class="intro-pills">
        <div class="pill"><span class="pill-icon">🧠</span>20 Questions</div>
        <div class="pill"><span class="pill-icon">⚡</span>Instant Feedback</div>
        <div class="pill"><span class="pill-icon">🏆</span>Score Tracking</div>
      </div>
      <button class="cta-btn" id="start-btn">
        <span class="cta-bg"></span>
        <span class="cta-text">Launch Quiz</span>
        <span class="cta-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M13 7l5 5-5 5M6 12h12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </button>
    </div>
  </div>

  <!-- ══════════════════════════════════
       QUIZ SCREEN
  ══════════════════════════════════ -->
  <div id="quiz-screen" class="screen">
    <div class="quiz-shell">

      <!-- Header -->
      <header class="quiz-header">
        <div class="header-left">
          <div class="logo-sm">CQ</div>
          <div class="qcount-wrap">
            <span class="qcount-num" id="cur-q">1</span>
            <span class="qcount-sep">/</span>
            <span class="qcount-total">20</span>
          </div>
        </div>

        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
          <div class="progress-glow" id="progress-glow"></div>
        </div>

        <div class="header-right">
          <div class="score-badge" id="score-badge">
            <span class="score-icon">★</span>
            <span class="score-num" id="score-num">0</span>
          </div>
        </div>
      </header>

      <!-- Main question card -->
      <div class="card-stage" id="card-stage">
        <div class="q-glass-card" id="q-card">
          <div class="card-shimmer"></div>
          <div class="card-top-bar">
            <span class="category-chip" id="cat-chip">General</span>
            <span class="q-index-badge" id="q-index-badge">01</span>
          </div>
          <p class="q-body" id="q-body">Loading question...</p>
        </div>
      </div>

      <!-- Options -->
      <div class="options-wrap" id="options-wrap"></div>

      <!-- Feedback strip -->
      <div class="feedback-strip" id="feedback-strip">
        <div class="strip-inner" id="strip-inner"></div>
      </div>

      <!-- Footer nav -->
      <footer class="quiz-footer">
        <button class="foot-btn prev-foot" id="prev-btn" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 5l-7 7 7 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Previous
        </button>

        <div class="trail-dots" id="trail-dots"></div>

        <button class="foot-btn next-foot" id="next-btn">
          <span id="next-label">Next</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </footer>

    </div>
  </div>

  <!-- ══════════════════════════════════
       RESULT SCREEN
  ══════════════════════════════════ -->
  <div id="result-screen" class="screen">
    <canvas id="confetti-canvas"></canvas>
    <div class="result-shell">
      <div class="result-medal" id="result-medal"></div>
      <div class="result-score-ring">
        <svg width="200" height="200" viewBox="0 0 200 200">
          <defs>
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#00f5d4"/>
              <stop offset="100%" stop-color="#f72585"/>
            </linearGradient>
          </defs>
          <circle class="r-ring-bg" cx="100" cy="100" r="86"/>
          <circle class="r-ring-fg" id="r-ring-fg" cx="100" cy="100" r="86"
            stroke-dasharray="540.35" stroke-dashoffset="540.35"/>
        </svg>
        <div class="r-score-inner">
          <span class="r-score-num" id="r-score-num">0</span>
          <span class="r-score-denom">/20</span>
          <span class="r-pct" id="r-pct">0%</span>
        </div>
      </div>
      <h2 class="r-headline" id="r-headline"></h2>
      <p class="r-tagline" id="r-tagline"></p>
      <div class="r-stats">
        <div class="r-stat r-stat-correct">
          <span class="r-stat-n" id="rs-correct">0</span>
          <span class="r-stat-l">Correct</span>
        </div>
        <div class="r-stat r-stat-wrong">
          <span class="r-stat-n" id="rs-wrong">0</span>
          <span class="r-stat-l">Wrong</span>
        </div>
        <div class="r-stat r-stat-skip">
          <span class="r-stat-n" id="rs-skip">0</span>
          <span class="r-stat-l">Skipped</span>
        </div>
      </div>
      <div class="r-actions">
        <button class="cta-btn replay-btn" id="restart-btn">
          <span class="cta-bg"></span>
          <span class="cta-text">Play Again</span>
          <span class="cta-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M1 4v6h6M23 20v-6h-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
        </button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

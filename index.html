<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Knowledge Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="quiz-container" id="quiz">
        <div class="quiz-header">
            <span id="question-number">Question 1/20</span>
            <div class="progress-bar"><div id="progress"></div></div>
        </div>
        
        <div id="question-content">
            <h2 id="question-text">Question loading...</h2>
            <div id="answer-options" class="options-grid">
                </div>
        </div>

        <div class="navigation-controls">
            <button id="prev-btn" onclick="prevQuestion()" disabled>Previous</button>
            <button id="next-btn" onclick="nextQuestion()">Next / Skip</button>
        </div>
    </div>

    <div id="result-modal" class="modal">
        <div class="modal-content">
            <h2>Quiz Complete!</h2>
            <p id="score-text"></p>
            <button onclick="location.reload()">Restart Quiz</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
